async function loadSetores(empresaId) {
  if (!empresaId) return;
  const { data } = await sb.from('empresa_setores').select('setores(id,nome)').eq('empresa_id', empresaId);
  const setorSel = document.getElementById('nc-setor');
  setorSel.innerHTML = '<option value="">Selecione...</option>' + (data||[]).map(r => `<option value="${r.setores.id}">${r.setores.nome}</option>`).join('');
}

function previewFiles(input) {
  const list = document.getElementById('nc-file-list');
  list.innerHTML = '';
  Array.from(input.files).forEach((f,i) => {
    list.innerHTML += `<div class="file-item"><span>📄</span><span class="file-item-name">${f.name}</span><span class="text-xs text-muted">${(f.size/1024).toFixed(0)}KB</span></div>`;
  });
}

async function submeterChamado() {
  const empresa = document.getElementById('nc-empresa').value;
  const setor = document.getElementById('nc-setor').value;
  const titulo = document.getElementById('nc-titulo').value.trim();
  const tipo = document.getElementById('nc-tipo').value;
  const descricao = document.getElementById('nc-descricao').value.trim();
  const data = document.getElementById('nc-data').value;

  if (!empresa || !setor || !titulo || !tipo || !descricao) { toast('Preencha todos os campos obrigatórios', 'error'); return; }

  const { data: chamado, error } = await sb.from('chamados').insert({
    titulo, descricao, empresa_id:empresa, setor_id:setor, tipo_servico_id:tipo,
    solicitante_id:currentUser.id, status:'aprovacao',
    data_desejada:data||null
  }).select().single();

  if (error) { toast('Erro ao criar chamado: ' + error.message, 'error'); return; }

  await sb.from('historico_status').insert({chamado_id:chamado.id, usuario_id:currentUser.id, status_anterior:null, status_novo:'aprovacao', observacao:'Chamado criado'});

  // Upload de arquivos
  const files = document.getElementById('nc-files').files;
  for (const file of files) {
    const path = `${chamado.id}/${Date.now()}_${file.name}`;
    const { error: upErr } = await sb.storage.from('anexos-chamados').upload(path, file);
    if (!upErr) {
      await sb.from('anexos_chamado').insert({ chamado_id:chamado.id, usuario_id:currentUser.id, nome_arquivo:file.name, storage_path:path, tamanho_bytes:file.size, tipo_mime:file.type });
    }
  }

  document.querySelector('.modal-overlay')?.remove();
  toast(`Chamado ${chamado.codigo} criado com sucesso!`);
  updateBadges();
  navigateTo(currentPage);
}

// ═══════════════════════════════════════════════════
// LANÇAMENTO DE HORAS
// ═══════════════════════════════════════════════════
async function openLancamento(chamadoId) {
  const { data: c } = await sb.from('chamados').select('codigo, titulo, horas_estimadas').eq('id', chamadoId).single();
  const { data: diario } = await sb.from('diario_bordo').select('horas').eq('chamado_id', chamadoId);
  const totalHoras = (diario||[]).reduce((a,b) => a+b.horas, 0);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div><h2>Lançar Horas</h2><div class="text-xs text-muted font-mono" style="margin-top:4px">${c.codigo} — ${c.titulo}</div></div>
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        ${c.horas_estimadas ? `
        <div class="info-row" style="margin-bottom:16px">
          <div class="info-item"><span class="info-label">Estimado</span><span class="info-val">${c.horas_estimadas}h</span></div>
          <div class="info-item"><span class="info-label">Lançado</span><span class="info-val" style="color:var(--accent)">${totalHoras.toFixed(1)}h</span></div>
          <div class="info-item"><span class="info-label">Saldo</span><span class="info-val" style="color:${totalHoras > c.horas_estimadas ? 'var(--red)' : 'var(--green)'}">${(c.horas_estimadas - totalHoras).toFixed(1)}h</span></div>
        </div>` : ''}
        <div class="form-row">
          <div class="field">
            <label>Tipo *</label>
            <select id="lan-tipo">
              <option value="projeto">Projeto</option>
              <option value="acompanhamento_obra">Acompanhamento de Obra</option>
            </select>
          </div>
          <div class="field">
            <label>Data *</label>
            <input type="date" id="lan-data" value="${new Date().toISOString().split('T')[0]}">
          </div>
        </div>
        <div class="field">
          <label>Horas *</label>
          <input type="number" id="lan-horas" placeholder="Ex: 2.5" min="0.5" max="24" step="0.5">
        </div>
        <div class="field">
          <label>Descrição da Atividade *</label>
          <textarea id="lan-descricao" rows="3" placeholder="Descreva o que foi realizado..."></textarea>
        </div>
        <div class="field">
          <label>Atualizar Horas Estimadas</label>
          <input type="number" id="lan-est" placeholder="${c.horas_estimadas||'Não definido'}" min="0" step="0.5">
          <div class="text-xs text-muted" style="margin-top:4px">Deixe em branco para manter o valor atual</div>
        </div>
        <div class="form-section" style="margin-top:16px">
          <div class="form-section-title">Fotos / Arquivos</div>
          <div class="file-upload-area" onclick="document.getElementById('lan-files').click()">
            <input type="file" id="lan-files" multiple accept="image/*,.pdf,.dwg,.doc,.docx" onchange="previewLanFiles(this)">
            <div class="file-upload-icon">📷</div>
            <div class="file-upload-text">Fotos do andamento ou documentos</div>
          </div>
          <div class="file-list" id="lan-file-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarLancamento('${chamadoId}')">Salvar Lançamento</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function previewLanFiles(input) {
  const list = document.getElementById('lan-file-list');
  list.innerHTML = Array.from(input.files).map(f => `<div class="file-item"><span>📄</span><span class="file-item-name">${f.name}</span></div>`).join('');
}

async function confirmarLancamento(chamadoId) {
  const tipo = document.getElementById('lan-tipo').value;
  const data = document.getElementById('lan-data').value;
  const horas = parseFloat(document.getElementById('lan-horas').value);
  const descricao = document.getElementById('lan-descricao').value.trim();
  const novaEst = document.getElementById('lan-est').value;

  if (!data || !horas || !descricao) { toast('Preencha todos os campos obrigatórios', 'error'); return; }

  const { data: lancamento, error } = await sb.from('diario_bordo').insert({
    chamado_id:chamadoId, engenheiro_id:currentUser.id, tipo, data_trabalho:data, horas, descricao
  }).select().single();

  if (error) { toast('Erro: ' + error.message, 'error'); return; }

  if (novaEst) await sb.from('chamados').update({horas_estimadas:parseFloat(novaEst)}).eq('id',chamadoId);

  const files = document.getElementById('lan-files').files;
  for (const file of files) {
    const path = `${lancamento.id}/${Date.now()}_${file.name}`;
    const { error: upErr } = await sb.storage.from('anexos-diario').upload(path, file);
    if (!upErr) await sb.from('anexos_diario').insert({diario_id:lancamento.id, nome_arquivo:file.name, storage_path:path, tamanho_bytes:file.size, tipo_mime:file.type});
  }

  document.querySelectorAll('.modal-overlay').forEach(o => o.remove());
  toast('Lançamento salvo com sucesso!');
  navigateTo(currentPage);
}

async function downloadAnexo(path, bucket, nome) {
  const { data } = await sb.storage.from(bucket).createSignedUrl(path, 60);
  if (data?.signedUrl) { window.open(data.signedUrl, '_blank'); }
  else { toast('Erro ao baixar arquivo', 'error'); }
}

// ═══════════════════════════════════════════════════
// USUÁRIOS
// ═══════════════════════════════════════════════════
async function renderUsuarios() {
  document.getElementById('topbar-title').textContent = 'Usuários';
  const page = document.getElementById('page-content');
  page.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

  const { data: usuarios } = await sb.from('usuarios').select('*').order('criado_em', {ascending:false});

  page.innerHTML = `
    <div class="table-card">
      <div class="table-header"><div class="table-title">Usuários do Sistema</div></div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Desde</th><th>Ação</th></tr></thead>
        <tbody>
          ${(usuarios||[]).map(u => `
            <tr>
              <td><strong>${u.nome}</strong></td>
              <td><span class="text-muted text-sm">${u.email}</span></td>
              <td>${badgePerfil(u.perfil)}</td>
              <td><span class="text-muted text-sm">${fmtDate(u.criado_em)}</span></td>
              <td>${u.id !== currentUser.id ? `<select class="filter-select" onchange="alterarPerfil('${u.id}',this.value)">
                ${['pendente','solicitante','engenheiro','gestor','gestor_master'].map(p => `<option value="${p}" ${u.perfil===p?'selected':''}>${PERFIL_LABELS[p]}</option>`).join('')}
              </select>` : '<span class="text-muted text-xs">Você</span>'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      </div>
    </div>`;
}

async function alterarPerfil(userId, novoPerfil) {
  const { error } = await sb.from('usuarios').update({perfil:novoPerfil}).eq('id',userId);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Perfil atualizado');
  updateBadges();
}

// ═══════════════════════════════════════════════════
// CONFIGURAÇÕES
// ═══════════════════════════════════════════════════
async function renderConfiguracoes() {
  document.getElementById('topbar-title').textContent = 'Configurações';
  const page = document.getElementById('page-content');
  page.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

  const [{ data: tipos }, { data: empresas }, { data: setores }] = await Promise.all([
    sb.from('tipos_servico').select('*').order('nome'),
    sb.from('empresas').select('*').order('nome'),
    sb.from('setores').select('*').order('nome')
  ]);

  page.innerHTML = `
    <div style="display:grid;gap:20px;max-width:900px">

      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Tipos de Serviço</div>
          <button class="btn btn-primary btn-sm" onclick="addItem('tipos_servico','tipo de serviço')">+ Adicionar</button>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${(tipos||[]).map(t => `
              <tr>
                <td>${t.nome}</td>
                <td><span class="badge ${t.ativo ? 'badge-concluido' : 'badge-rejeitado'}">${t.ativo ? 'Ativo' : 'Inativo'}</span></td>
                <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="toggleItem('tipos_servico','${t.id}',${!t.ativo})">${t.ativo ? 'Desativar' : 'Ativar'}</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Empresas</div>
          <button class="btn btn-primary btn-sm" onclick="addItem('empresas','empresa')">+ Adicionar</button>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${(empresas||[]).map(e => `
              <tr>
                <td>${e.nome}</td>
                <td><span class="badge ${e.ativo ? 'badge-concluido' : 'badge-rejeitado'}">${e.ativo ? 'Ativa' : 'Inativa'}</span></td>
                <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="toggleItem('empresas','${e.id}',${!e.ativo})">${e.ativo ? 'Desativar' : 'Ativar'}</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Setores</div>
          <button class="btn btn-primary btn-sm" onclick="addSetor()">+ Adicionar</button>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${(setores||[]).map(s => `
              <tr>
                <td>${s.nome}</td>
                <td><span class="badge ${s.ativo ? 'badge-concluido' : 'badge-rejeitado'}">${s.ativo ? 'Ativo' : 'Inativo'}</span></td>
                <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="toggleItem('setores','${s.id}',${!s.ativo})">${s.ativo ? 'Desativar' : 'Ativar'}</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

    </div>`;
}

async function addItem(tabela, label) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-add-item';
  overlay.innerHTML = `
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2>Novo ${label}</h2>
        <button class="close-btn" onclick="document.getElementById('modal-add-item').remove()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Nome</label>
          <input type="text" id="add-item-nome" placeholder="Digite o nome..." autofocus>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-add-item').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarAddItem('${tabela}','${label}')">Adicionar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('add-item-nome')?.focus(), 100);
  document.getElementById('add-item-nome').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmarAddItem(tabela, label);
  });
}

async function confirmarAddItem(tabela, label) {
  const nome = document.getElementById('add-item-nome')?.value?.trim();
  if (!nome) { toast('Digite um nome', 'error'); return; }
  const { error } = await sb.from(tabela).insert({nome});
  document.getElementById('modal-add-item')?.remove();
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast(`${label} adicionado`);
  renderConfiguracoes();
}

async function addSetor() {
  const { data: empresas } = await sb.from('empresas').select('id,nome').eq('ativo',true).order('nome');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-add-setor';
  overlay.innerHTML = `
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <h2>Novo Setor</h2>
        <button class="close-btn" onclick="document.getElementById('modal-add-setor').remove()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Nome do Setor</label>
          <input type="text" id="setor-nome" placeholder="Digite o nome do setor...">
        </div>
        <div class="field">
          <label>Empresas que terão este setor</label>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
            <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;font-weight:400;color:var(--text)">
              <input type="checkbox" id="setor-todas" onchange="toggleTodasEmpresas(this)" style="width:auto"> Todas as empresas
            </label>
            <div id="setor-empresas-list" style="display:flex;flex-direction:column;gap:6px;padding-left:8px;border-left:2px solid var(--border)">
              ${(empresas||[]).map(e => `
                <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;font-weight:400;color:var(--text)">
                  <input type="checkbox" class="emp-check" value="${e.id}" style="width:auto"> ${e.nome}
                </label>`).join('')}
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-add-setor').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarAddSetor()">Adicionar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('setor-nome')?.focus(), 100);
}

function toggleTodasEmpresas(cb) {
  document.querySelectorAll('.emp-check').forEach(c => c.checked = cb.checked);
}

async function confirmarAddSetor() {
  const nome = document.getElementById('setor-nome')?.value?.trim();
  if (!nome) { toast('Digite o nome do setor', 'error'); return; }

  const { data: setor, error } = await sb.from('setores').insert({nome}).select().single();
  if (error) { toast('Erro: ' + error.message, 'error'); return; }

  const checkedEmps = [...document.querySelectorAll('.emp-check:checked')].map(c => c.value);
  for (const empId of checkedEmps) {
    await sb.from('empresa_setores').insert({empresa_id:empId, setor_id:setor.id}).catch(()=>{});
  }

  document.getElementById('modal-add-setor')?.remove();
  toast('Setor adicionado');
  renderConfiguracoes();
}

async function toggleItem(tabela, id, ativo) {
  await sb.from(tabela).update({ativo}).eq('id',id);
  toast(ativo ? 'Ativado' : 'Desativado');
  renderConfiguracoes();
}
</script>
</body>
</html>
