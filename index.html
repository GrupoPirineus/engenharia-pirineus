<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engenharia | Grupo Pirineus</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f0f4f7;
    --surface: #ffffff;
    --surface2: #e8f0f5;
    --border: #d0dde8;
    --border2: #b0c4d4;
    --text: #0f2233;
    --text2: #4a6478;
    --text3: #8aa0b0;
    --accent: #1a9e9e;
    --accent2: #148080;
    --accent-dim: rgba(26,158,158,0.10);
    --green: #0e9e6e;
    --green-dim: rgba(14,158,110,0.10);
    --red: #e03e3e;
    --red-dim: rgba(224,62,62,0.10);
    --blue: #1a5c9e;
    --blue-dim: rgba(26,92,158,0.10);
    --orange: #e07820;
    --orange-dim: rgba(224,120,32,0.10);
    --purple: #6a3eb8;
    --purple-dim: rgba(106,62,184,0.10);
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 4px 24px rgba(15,34,51,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── AUTH ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
  }

  .auth-box {
    width: 100%;
    max-width: 400px;
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .auth-logo h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .auth-logo p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px;
    box-shadow: 0 8px 32px rgba(15,34,51,0.10);
  }

  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 28px;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .auth-tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  input, select, textarea {
    width: 100%;
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s;
    outline: none;
    appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  select option { background: #ffffff; color: var(--text); }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }

  .btn-primary { background: var(--accent); color: #ffffff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border2); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; }
  .success-msg { color: var(--green); font-size: 13px; margin-top: 12px; text-align: center; }

  /* ── PENDING SCREEN ── */
  #pending-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .pending-box {
    text-align: center;
    max-width: 360px;
  }

  .pending-icon {
    width: 64px; height: 64px;
    background: var(--orange-dim);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }

  /* ── APP LAYOUT ── */
  #app-screen { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    box-shadow: 2px 0 8px rgba(15,34,51,0.06);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.2s;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-logo-mark svg { width: 16px; height: 16px; }

  .sidebar-logo-text { line-height: 1.2; }
  .sidebar-logo-text strong { font-size: 13px; font-weight: 700; display: block; color: var(--accent); }
  .sidebar-logo-text span { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

  .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }

  .nav-section { margin-bottom: 20px; }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 12px;
    margin-bottom: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius);
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'Inter', sans-serif;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .nav-badge {
    margin-left: auto;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 12px 8px;
    border-top: 1px solid var(--border);
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius);
    cursor: pointer;
  }

  .user-avatar {
    width: 32px; height: 32px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .user-details { overflow: hidden; flex: 1; }
  .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text2); }

  .main-content {
    flex: 1;
    margin-left: 240px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 8px rgba(15,34,51,0.06);
  }

  .topbar-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  .page { padding: 24px; flex: 1; }

  /* ── STATS GRID ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.amber::before { background: var(--accent); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.purple::before { background: var(--purple); }
  .stat-card.orange::before { background: var(--orange); }

  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
  .stat-card.amber .stat-value { color: var(--accent); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.red .stat-value { color: var(--red); }
  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.purple .stat-value { color: var(--purple); }
  .stat-card.orange .stat-value { color: var(--orange); }

  /* ── CHARTS ── */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }

  .chart-wrap { position: relative; height: 200px; }

  /* ── TABLE ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-title { font-size: 14px; font-weight: 600; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; }

  .filter-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    color: var(--text);
    font-size: 13px;
    width: auto;
    cursor: pointer;
  }

  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 12px;
    color: var(--text);
    font-size: 13px;
    width: 200px;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); cursor: pointer; }

  /* ── BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-solicitacao { background: var(--blue-dim); color: var(--blue); }
  .badge-aprovacao { background: var(--orange-dim); color: var(--orange); }
  .badge-atribuicao { background: var(--purple-dim); color: var(--purple); }
  .badge-execucao { background: var(--accent-dim); color: var(--accent); }
  .badge-revisao { background: rgba(99,102,241,0.15); color: #818cf8; }
  .badge-concluido { background: var(--green-dim); color: var(--green); }
  .badge-rejeitado { background: var(--red-dim); color: var(--red); }

  .badge-baixa { background: var(--green-dim); color: var(--green); }
  .badge-media { background: var(--blue-dim); color: var(--blue); }
  .badge-alta { background: var(--orange-dim); color: var(--orange); }
  .badge-urgente { background: var(--red-dim); color: var(--red); }

  .badge-pendente { background: var(--orange-dim); color: var(--orange); }
  .badge-solicitante { background: var(--blue-dim); color: var(--blue); }
  .badge-engenheiro { background: var(--purple-dim); color: var(--purple); }
  .badge-gestor { background: var(--accent-dim); color: var(--accent); }
  .badge-gestor_master { background: var(--red-dim); color: var(--red); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,34,51,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
  }

  .modal-lg { max-width: 800px; }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .modal-header h2 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }

  .modal-body { padding: 24px; }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }

  .close-btn {
    background: transparent;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--text); }
  .close-btn svg { width: 20px; height: 20px; }

  /* ── DETAIL VIEW ── */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .detail-item label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .detail-item p { font-size: 14px; color: var(--text); }
  .detail-full { grid-column: 1 / -1; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* ── TIMELINE ── */
  .timeline { display: flex; flex-direction: column; gap: 0; }

  .timeline-item {
    display: flex;
    gap: 16px;
    padding-bottom: 20px;
    position: relative;
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 32px;
    bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .timeline-item:last-child::before { display: none; }

  .timeline-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 13px;
  }

  .timeline-content { flex: 1; padding-top: 4px; }
  .timeline-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .timeline-meta { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .timeline-desc { font-size: 13px; color: var(--text2); }

  /* ── DIÁRIO CARD ── */
  .diario-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .diario-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .diario-date { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
  .diario-hours { font-size: 12px; font-weight: 600; color: var(--accent); }
  .diario-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ── FORM SECTIONS ── */
  .form-section { margin-bottom: 24px; }
  .form-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ── FILE UPLOAD ── */
  .file-upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .file-upload-area:hover { border-color: var(--accent); }
  .file-upload-area input { display: none; }
  .file-upload-icon { font-size: 24px; margin-bottom: 8px; }
  .file-upload-text { font-size: 13px; color: var(--text2); }
  .file-upload-text strong { color: var(--accent); cursor: pointer; }

  .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .file-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px;
    font-size: 12px;
  }
  .file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-remove { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px; }
  .file-remove:hover { color: var(--red); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .empty-desc { font-size: 13px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    z-index: 9999;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    max-width: 320px;
    color: var(--text);
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* ── LOADING ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 48px;
    color: var(--text2);
    gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATUS FLOW ── */
  .status-flow {
    display: flex; align-items: center; gap: 4px;
    overflow-x: auto; padding: 4px 0; margin-bottom: 20px;
  }
  .status-step {
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .status-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .status-dot.done { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .status-dot.current { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .status-label { font-size: 11px; color: var(--text2); }
  .status-arrow { color: var(--text3); font-size: 12px; }

  /* ── RESPONSIVE ── */
  .hamburger {
    display: none;
    background: transparent; border: none; color: var(--text); cursor: pointer;
    padding: 4px;
  }
  .hamburger svg { width: 20px; height: 20px; }

  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.show { display: block; }
    .main-content { margin-left: 0; }
    .hamburger { display: flex; }
    .form-row { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .filters { flex-direction: column; }
    .search-input { width: 100%; }
  }

  /* ── UTILS ── */
  .hidden { display: none !important; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-4 { margin-bottom: 16px; }
  .text-sm { font-size: 13px; }
  .text-xs { font-size: 11px; }
  .text-muted { color: var(--text2); }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .text-right { text-align: right; }
  .w-full { width: 100%; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }

  .info-row {
    display: flex; gap: 24px; flex-wrap: wrap;
    background: var(--surface2); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 16px;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .info-val { font-size: 13px; font-weight: 500; }

  .progress-bar {
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  .tag {
    display: inline-block; padding: 2px 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; font-size: 11px; color: var(--text2);
  }
</style>
</head>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SUPABASE_URL = 'https://oklglgvhlqixzxngbsvw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rbGdsZ3ZobHFpeHp4bmdic3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzMxMjEsImV4cCI6MjA5NzEwOTEyMX0.o7f97GDLFxFQiZyEvFjDlMhNeCkpnFIr-YLC3gpH5F8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentPerfil = null;
let currentPage = null;
let charts = {};

// ═══════════════════════════════════════════════════
// LABELS
// ═══════════════════════════════════════════════════
const STATUS_LABELS = {
  solicitacao:'Solicitação', aprovacao:'Aprovação', atribuicao:'Atribuição',
  execucao:'Execução', revisao:'Revisão', concluido:'Concluído', rejeitado:'Rejeitado'
};
const PRIORIDADE_LABELS = { baixa:'Baixa', media:'Média', alta:'Alta', urgente:'Urgente' };
const PERFIL_LABELS = {
  pendente:'Pendente', solicitante:'Solicitante', engenheiro:'Engenheiro',
  gestor:'Gestor', gestor_master:'Gestor Master'
};
const TIPO_LANCAMENTO = { projeto:'Projeto', acompanhamento_obra:'Acompanhamento de Obra' };

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function setPage(id) {
  ['auth-screen','pending-screen','app-screen'].forEach(s => hide(s));
  show(id);
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => el.className = '', 3000);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('pt-BR');
}

function fmtDateTime(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function badgeStatus(s) {
  return `<span class="badge badge-${s}">${STATUS_LABELS[s]||s}</span>`;
}
function badgePrio(p) {
  if (!p) return '<span class="text-muted">—</span>';
  return `<span class="badge badge-${p}">${PRIORIDADE_LABELS[p]||p}</span>`;
}
function badgePerfil(p) {
  return `<span class="badge badge-${p}">${PERFIL_LABELS[p]||p}</span>`;
}

function canApprove() { return ['gestor','gestor_master'].includes(currentPerfil); }
function isGestor() { return ['gestor','gestor_master'].includes(currentPerfil); }
function isMaster() { return currentPerfil === 'gestor_master'; }
function isEngenheiro() { return currentPerfil === 'engenheiro'; }
function isSolicitante() { return currentPerfil === 'solicitante'; }

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  tab==='login' ? (show('login-form'), hide('register-form')) : (hide('login-form'), show('register-form'));
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const msg = document.getElementById('login-msg');
  msg.innerHTML = '';
  if (!email || !pass) { msg.innerHTML = '<p class="error-msg">Preencha todos os campos.</p>'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.innerHTML = `<p class="error-msg">${error.message}</p>`; }
}

async function doRegister() {
  const nome = document.getElementById('reg-nome').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const msg = document.getElementById('register-msg');
  msg.innerHTML = '';
  if (!nome || !email || !pass) { msg.innerHTML = '<p class="error-msg">Preencha todos os campos.</p>'; return; }
  if (pass.length < 6) { msg.innerHTML = '<p class="error-msg">Senha mínima de 6 caracteres.</p>'; return; }
  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { nome } } });
  if (error) { msg.innerHTML = `<p class="error-msg">${error.message}</p>`; }
  else { msg.innerHTML = '<p class="success-msg">Cadastro realizado! Verifique seu e-mail e aguarde aprovação do gestor.</p>'; }
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentPerfil = null;
  setPage('auth-screen');
}

// ═══════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    await loadUserProfile();
  } else {
    setPage('auth-screen');
  }
});

async function loadUserProfile() {
  const { data } = await sb.from('usuarios').select('*').eq('id', currentUser.id).single();
  if (!data) { setPage('auth-screen'); return; }
  currentPerfil = data.perfil;
  if (data.perfil === 'pendente') { setPage('pending-screen'); return; }
  setupApp(data);
}

// ═══════════════════════════════════════════════════
// APP SETUP
// ═══════════════════════════════════════════════════
function setupApp(userData) {
  setPage('app-screen');
  document.getElementById('user-name-display').textContent = userData.nome;
  document.getElementById('user-role-display').textContent = PERFIL_LABELS[userData.perfil] || userData.perfil;
  document.getElementById('user-avatar').textContent = userData.nome.charAt(0).toUpperCase();
  buildNav();
  navigateTo('dashboard');
}

      </button>
    </div>`;
  }

  nav.innerHTML = html;
  updateBadges();
}

async function updateBadges() {
  if (isGestor()) {
    const { count: ap } = await sb.from('chamados').select('*', {count:'exact',head:true}).eq('status','aprovacao');
    const { count: pe } = await sb.from('usuarios').select('*', {count:'exact',head:true}).eq('perfil','pendente');
    const badgeAp = document.getElementById('badge-aprovacao');
    const badgePe = document.getElementById('badge-pendentes');
    if (badgeAp) { badgeAp.textContent = ap||0; ap>0 ? badgeAp.classList.remove('hidden') : badgeAp.classList.add('hidden'); }
    if (badgePe) { badgePe.textContent = pe||0; pe>0 ? badgePe.classList.remove('hidden') : badgePe.classList.add('hidden'); }
  }
}

function navigateTo(page) {
  currentPage = page;
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(page)) el.classList.add('active');
  });
  document.getElementById('topbar-actions').innerHTML = '';
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'chamados': renderChamados(); break;
    case 'meus-chamados': renderMeusChamados(); break;
    case 'minha-fila': renderMinhaFila(); break;
    case 'usuarios': renderUsuarios(); break;
    case 'configuracoes': renderConfiguracoes(); break;
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// DASHBOARD
// ═══════════════════════════════════════════════════
async function renderDashboard() {
  document.getElementById('topbar-title').textContent = 'Dashboard';
  const page = document.getElementById('page-content');
  page.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

  const now = new Date();
  const mesInicio = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const mesFim = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString();

  const [{ data: todos }, { data: mesChamados }, { data: horas }] = await Promise.all([
    sb.from('chamados').select('status, prioridade, data_desejada, empresa_id, tipo_servico_id, criado_em'),
    sb.from('chamados').select('status, criado_em').gte('criado_em', mesInicio),
    sb.from('diario_bordo').select('horas, data_trabalho, chamado_id').gte('data_trabalho', mesInicio.split('T')[0])
  ]);

  const abertos = (todos||[]).filter(c => !['concluido','rejeitado'].includes(c.status)).length;
  const aguardando = (todos||[]).filter(c => c.status === 'aprovacao').length;
  const emExecucao = (todos||[]).filter(c => c.status === 'execucao').length;
  const hoje = new Date().toISOString().split('T')[0];
  const atrasados = (todos||[]).filter(c => c.data_desejada && c.data_desejada < hoje && !['concluido','rejeitado'].includes(c.status)).length;
  const concluidosMes = (mesChamados||[]).filter(c => c.status === 'concluido').length;
  const totalHorasMes = (horas||[]).reduce((a,b) => a + (b.horas||0), 0);

  // por status
  const porStatus = {};
  (todos||[]).forEach(c => { porStatus[c.status] = (porStatus[c.status]||0)+1; });

  // por empresa (precisamos buscar empresas)
  const { data: empresas } = await sb.from('empresas').select('id,nome');
  const empMap = {};
  (empresas||[]).forEach(e => empMap[e.id] = e.nome);

  const porEmpresa = {};
  (todos||[]).forEach(c => {
    const n = empMap[c.empresa_id] || 'Outros';
    porEmpresa[n] = (porEmpresa[n]||0)+1;
  });

  // horas por mês (últimos 6 meses)
  const { data: todasHoras } = await sb.from('diario_bordo').select('horas, data_trabalho')
    .gte('data_trabalho', new Date(now.getFullYear(), now.getMonth()-5, 1).toISOString().split('T')[0]);

  const horasPorMes = {};
  const abertosConcluidosPorMes = {};
  const meses6 = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
    meses6.push({key, label});
    horasPorMes[key] = 0;
    abertosConcluidosPorMes[key] = {abertos:0, concluidos:0};
  }

  (todasHoras||[]).forEach(h => {
    const key = h.data_trabalho?.substring(0,7);
    if (horasPorMes[key] !== undefined) horasPorMes[key] += h.horas||0;
  });

  const { data: todosChamados } = await sb.from('chamados').select('status, criado_em')
    .gte('criado_em', new Date(now.getFullYear(), now.getMonth()-5, 1).toISOString());
  (todosChamados||[]).forEach(c => {
    const key = c.criado_em?.substring(0,7);
    if (abertosConcluidosPorMes[key] !== undefined) {
      abertosConcluidosPorMes[key].abertos++;
      if (c.status === 'concluido') abertosConcluidosPorMes[key].concluidos++;
    }
  });

  page.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card amber"><div class="stat-label">Chamados Abertos</div><div class="stat-value">${abertos}</div></div>
      <div class="stat-card orange"><div class="stat-label">Aguardando Aprovação</div><div class="stat-value">${aguardando}</div></div>
      <div class="stat-card blue"><div class="stat-label">Em Execução</div><div class="stat-value">${emExecucao}</div></div>
      <div class="stat-card red"><div class="stat-label">Atrasados</div><div class="stat-value">${atrasados}</div></div>
      <div class="stat-card green"><div class="stat-label">Concluídos no Mês</div><div class="stat-value">${concluidosMes}</div></div>
      <div class="stat-card purple"><div class="stat-label">Horas no Mês</div><div class="stat-value">${totalHorasMes.toFixed(0)}h</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Chamados por Status</div><div class="chart-wrap"><canvas id="chartStatus"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Chamados por Empresa</div><div class="chart-wrap"><canvas id="chartEmpresa"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Horas Lançadas por Mês</div><div class="chart-wrap"><canvas id="chartHoras"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Abertos vs Concluídos por Mês</div><div class="chart-wrap"><canvas id="chartAbConc"></canvas></div></div>
    </div>
  `;

  const chartOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8b92a8', font: { size: 11 } } } } };
  const gridOpts = { color: '#2a3045' };

  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  charts.status = new Chart(document.getElementById('chartStatus'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(porStatus).map(k => STATUS_LABELS[k]||k),
      datasets: [{ data: Object.values(porStatus), backgroundColor: ['#3b82f6','#f97316','#8b5cf6','#f59e0b','#818cf8','#10b981','#ef4444'], borderWidth: 0 }]
    },
    options: { ...chartOpts, cutout: '65%' }
  });

  charts.empresa = new Chart(document.getElementById('chartEmpresa'), {
    type: 'bar',
    data: {
      labels: Object.keys(porEmpresa),
      datasets: [{ data: Object.values(porEmpresa), backgroundColor: '#f59e0b', borderRadius: 4 }]
    },
    options: { ...chartOpts, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b92a8', font:{size:10} }, grid: { color: gridOpts.color } }, y: { ticks: { color: '#8b92a8' }, grid: { color: gridOpts.color } } } }
  });

  charts.horas = new Chart(document.getElementById('chartHoras'), {
    type: 'line',
    data: {
      labels: meses6.map(m => m.label),
      datasets: [{ label: 'Horas', data: meses6.map(m => horasPorMes[m.key]), borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', fill: true, tension: 0.3, pointBackgroundColor: '#f59e0b' }]
    },
    options: { ...chartOpts, scales: { x: { ticks: { color: '#8b92a8' }, grid: { color: gridOpts.color } }, y: { ticks: { color: '#8b92a8' }, grid: { color: gridOpts.color } } } }
  });

  charts.abConc = new Chart(document.getElementById('chartAbConc'), {
    type: 'bar',
    data: {
      labels: meses6.map(m => m.label),
      datasets: [
        { label: 'Abertos', data: meses6.map(m => abertosConcluidosPorMes[m.key]?.abertos||0), backgroundColor: '#3b82f6', borderRadius: 4 },
        { label: 'Concluídos', data: meses6.map(m => abertosConcluidosPorMes[m.key]?.concluidos||0), backgroundColor: '#10b981', borderRadius: 4 }
      ]
    },
    options: { ...chartOpts, scales: { x: { ticks: { color: '#8b92a8' }, grid: { color: gridOpts.color } }, y: { ticks: { color: '#8b92a8' }, grid: { color: gridOpts.color } } } }
  });
}

// DETALHE DO CHAMADO

async function openChamado(id) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal modal-lg"><div class="loading"><div class="spinner"></div> Carregando...</div></div>';
  document.body.appendChild(overlay);

  const { data: c } = await sb.from('chamados')
    .select(`*, empresas(nome), setores(nome), tipos_servico(nome), solicitante:usuarios!chamados_solicitante_id_fkey(nome,email), engenheiro:usuarios!chamados_engenheiro_id_fkey(nome)`)
    .eq('id', id).single();

  const { data: diario } = await sb.from('diario_bordo').select('*').eq('chamado_id', id).order('data_trabalho', {ascending:false});
  const { data: historico } = await sb.from('historico_status').select('*, usuario:usuarios(nome)').eq('chamado_id', id).order('criado_em', {ascending:false});
  const { data: anexos } = await sb.from('anexos_chamado').select('*').eq('chamado_id', id);

  const totalHoras = (diario||[]).reduce((a,b) => a+b.horas, 0);
  const hoje = new Date().toISOString().split('T')[0];
  const atrasado = c.data_desejada && c.data_desejada < hoje && !['concluido','rejeitado'].includes(c.status);

  const statusFlow = ['solicitacao','aprovacao','atribuicao','execucao','revisao','concluido'];
  const currentIdx = statusFlow.indexOf(c.status);

  let acoes = '';
  if (isGestor()) {
    if (c.status === 'aprovacao') {
      acoes = `
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="aprovarChamado('${id}')">✓ Aprovar</button>
          <button class="btn btn-danger btn-sm" onclick="rejeitarChamado('${id}')">✗ Rejeitar</button>
        </div>`;
    }
    if (c.status === 'atribuicao') {
      acoes = `<button class="btn btn-primary btn-sm" onclick="atribuirEngenheiro('${id}')">Atribuir Engenheiro</button>`;
    }
    if (!c.prioridade && c.status !== 'rejeitado') {
      acoes += `<button class="btn btn-secondary btn-sm" onclick="definirPrioridade('${id}')">Definir Prioridade</button>`;
    }
    if (c.status === 'revisao') {
      acoes += `<button class="btn btn-primary btn-sm" onclick="moverStatus('${id}','concluido','Chamado concluído')">✓ Concluir</button>`;
    }
  }

  if (isEngenheiro() && c.engenheiro_id === currentUser.id) {
    if (c.status === 'execucao') {
      acoes = `
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="openLancamento('${id}')">+ Lançar Horas</button>
          <button class="btn btn-secondary btn-sm" onclick="moverStatus('${id}','revisao','Enviado para revisão')">Enviar para Revisão</button>
        </div>`;
    }
  }

  if (isSolicitante() && c.solicitante_id === currentUser.id) {
    if (c.status === 'rejeitado') {
      acoes = `<button class="btn btn-primary btn-sm" onclick="reabrirChamado('${id}')">Revisar e Reabrir</button>`;
    }
    if (['solicitacao'].includes(c.status)) {
      acoes = `<button class="btn btn-secondary btn-sm" onclick="addAnexo('${id}')">+ Adicionar Anexo</button>`;
    }
  }

  overlay.querySelector('.modal').innerHTML = `
    <div class="modal-header">
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span class="font-mono text-xs" style="color:var(--accent)">${c.codigo}</span>
          ${badgeStatus(c.status)}
          ${atrasado ? '<span class="badge badge-urgente">⚠ Atrasado</span>' : ''}
        </div>
        <h2>${c.titulo}</h2>
      </div>
      <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">

      ${c.status !== 'rejeitado' ? `
      <div class="status-flow">
        ${statusFlow.map((s,i) => `
          <div class="status-step">
            <div class="status-dot ${i < currentIdx ? 'done' : i === currentIdx ? 'current' : ''}">
              ${i < currentIdx ? '✓' : i+1}
            </div>
            <span class="status-label">${STATUS_LABELS[s]}</span>
          </div>
          ${i < statusFlow.length-1 ? '<span class="status-arrow">›</span>' : ''}
        `).join('')}
      </div>` : ''}

      ${c.motivo_rejeicao ? `<div style="background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px"><div class="text-xs" style="color:var(--red);margin-bottom:4px;font-weight:600">MOTIVO DA REJEIÇÃO</div><div class="text-sm">${c.motivo_rejeicao}</div></div>` : ''}

      <div class="info-row">
        <div class="info-item"><span class="info-label">Empresa</span><span class="info-val">${c.empresas?.nome||'—'}</span></div>
        <div class="info-item"><span class="info-label">Setor</span><span class="info-val">${c.setores?.nome||'—'}</span></div>
        <div class="info-item"><span class="info-label">Tipo</span><span class="info-val">${c.tipos_servico?.nome||'—'}</span></div>
        <div class="info-item"><span class="info-label">Prioridade</span><span class="info-val">${badgePrio(c.prioridade)}</span></div>
        <div class="info-item"><span class="info-label">Solicitante</span><span class="info-val">${c.solicitante?.nome||'—'}</span></div>
        <div class="info-item"><span class="info-label">Engenheiro</span><span class="info-val">${c.engenheiro?.nome||'Não atribuído'}</span></div>
        <div class="info-item"><span class="info-label">Data Desejada</span><span class="info-val">${fmtDate(c.data_desejada)}</span></div>
        <div class="info-item"><span class="info-label">Abertura</span><span class="info-val">${fmtDate(c.criado_em)}</span></div>

async function moverStatus(id, novoStatus, obs) {
  const { data: c } = await sb.from('chamados').select('status').eq('id',id).single();
  await sb.from('chamados').update({status: novoStatus}).eq('id',id);
  await sb.from('historico_status').insert({chamado_id:id, usuario_id:currentUser.id, status_anterior:c.status, status_novo:novoStatus, observacao:obs});
  toast(`Status atualizado: ${STATUS_LABELS[novoStatus]}`);
  document.querySelector('.modal-overlay')?.remove();
  updateBadges();
  navigateTo(currentPage);
}

async function aprovarChamado(id) {
  await moverStatus(id, 'atribuicao', 'Chamado aprovado');
}

async function rejeitarChamado(id) {
  const motivo = prompt('Motivo da rejeição:');
  if (!motivo) return;
  const { data: c } = await sb.from('chamados').select('status').eq('id',id).single();
  await sb.from('chamados').update({status:'rejeitado', motivo_rejeicao:motivo}).eq('id',id);
  await sb.from('historico_status').insert({chamado_id:id, usuario_id:currentUser.id, status_anterior:c.status, status_novo:'rejeitado', observacao:motivo});
  toast('Chamado rejeitado', 'error');
  document.querySelector('.modal-overlay')?.remove();
  updateBadges();
  navigateTo(currentPage);
}

async function reabrirChamado(id) {
  await moverStatus(id, 'solicitacao', 'Chamado reaberto pelo solicitante após rejeição');
}

async function atribuirEngenheiro(id) {

  const horas = document.getElementById('horas-est').value;

  navigateTo(currentPage);
}

async function loadSetores(empresaId) {
  if (!empresaId) return;
  const { data } = await sb.from('empresa_setores').select('setores(id,nome)').eq('empresa_id', empresaId);
  const setorSel = document.getElementById('nc-setor');
  setorSel.innerHTML = '<option value="">Selecione...</option>' + (data||[]).map(r => `<option value="${r.setores.id}">${r.setores.nome}</option>`).join('');
}

function previewFiles(input) {
  const list = document.getElementById('nc-file-list');
  list.innerHTML = '';
  Array.from(input.files).forEach((f,i) => {
    list.innerHTML += `<div class="file-item"><span>📄</span><span class="file-item-name">${f.name}</span><span class="text-xs text-muted">${(f.size/1024).toFixed(0)}KB</span></div>`;
  });
}

async function submeterChamado() {
  const empresa = document.getElementById('nc-empresa').value;
  const setor = document.getElementById('nc-setor').value;
  const titulo = document.getElementById('nc-titulo').value.trim();
  const tipo = document.getElementById('nc-tipo').value;
  const descricao = document.getElementById('nc-descricao').value.trim();
  const data = document.getElementById('nc-data').value;

  if (!empresa || !setor || !titulo || !tipo || !descricao) { toast('Preencha todos os campos obrigatórios', 'error'); return; }

  const { data: chamado, error } = await sb.from('chamados').insert({
    titulo, descricao, empresa_id:empresa, setor_id:setor, tipo_servico_id:tipo,
    solicitante_id:currentUser.id, status:'aprovacao',
    data_desejada:data||null
  }).select().single();

  if (error) { toast('Erro ao criar chamado: ' + error.message, 'error'); return; }

  await sb.from('historico_status').insert({chamado_id:chamado.id, usuario_id:currentUser.id, status_anterior:null, status_novo:'aprovacao', observacao:'Chamado criado'});

  // Upload de arquivos
  const files = document.getElementById('nc-files').files;
  for (const file of files) {
    const path = `${chamado.id}/${Date.now()}_${file.name}`;
    const { error: upErr } = await sb.storage.from('anexos-chamados').upload(path, file);
    if (!upErr) {
      await sb.from('anexos_chamado').insert({ chamado_id:chamado.id, usuario_id:currentUser.id, nome_arquivo:file.name, storage_path:path, tamanho_bytes:file.size, tipo_mime:file.type });
    }
  }

  document.querySelector('.modal-overlay')?.remove();
  toast(`Chamado ${chamado.codigo} criado com sucesso!`);
  updateBadges();
  navigateTo(currentPage);
}

        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

          <div class="info-item"><span class="info-label">Saldo</span><span class="info-val" style="color:${totalHoras > c.horas_estimadas ? 'var(--red)' : 'var(--green)'}">${(c.horas_estimadas - totalHoras).toFixed(1)}h</span></div>
        </div>` : ''}
        <div class="form-row">
          <div class="field">
            <label>Tipo *</label>
            <select id="lan-tipo">
              <option value="projeto">Projeto</option>
              <option value="acompanhamento_obra">Acompanhamento de Obra</option>
            </select>
          </div>
          <div class="field">
            <label>Data *</label>
            <input type="date" id="lan-data" value="${new Date().toISOString().split('T')[0]}">
          </div>
        </div>
        <div class="field">
          <label>Horas *</label>
          <input type="number" id="lan-horas" placeholder="Ex: 2.5" min="0.5" max="24" step="0.5">
        </div>
        <div class="field">
          <label>Descrição da Atividade *</label>
          <textarea id="lan-descricao" rows="3" placeholder="Descreva o que foi realizado..."></textarea>
        </div>
        <div class="field">
          <label>Atualizar Horas Estimadas</label>
          <input type="number" id="lan-est" placeholder="${c.horas_estimadas||'Não definido'}" min="0" step="0.5">
          <div class="text-xs text-muted" style="margin-top:4px">Deixe em branco para manter o valor atual</div>
        </div>
        <div class="form-section" style="margin-top:16px">
          <div class="form-section-title">Fotos / Arquivos</div>
          <div class="file-upload-area" onclick="document.getElementById('lan-files').click()">
            <input type="file" id="lan-files" multiple accept="image/*,.pdf,.dwg,.doc,.docx" onchange="previewLanFiles(this)">
            <div class="file-upload-icon">📷</div>
            <div class="file-upload-text">Fotos do andamento ou documentos</div>
          </div>
          <div class="file-list" id="lan-file-list"></div>
        </div>
      </div>
      <div class="modal-footer">

      </div>

function previewLanFiles(input) {
  const list = document.getElementById('lan-file-list');
  list.innerHTML = Array.from(input.files).map(f => `<div class="file-item"><span>📄</span><span class="file-item-name">${f.name}</span></div>`).join('');
}

async function confirmarLancamento(chamadoId) {
  const tipo = document.getElementById('lan-tipo').value;
  const data = document.getElementById('lan-data').value;
  const horas = parseFloat(document.getElementById('lan-horas').value);
  const descricao = document.getElementById('lan-descricao').value.trim();
  const novaEst = document.getElementById('lan-est').value;

  if (!data || !horas || !descricao) { toast('Preencha todos os campos obrigatórios', 'error'); return; }

  const { data: lancamento, error } = await sb.from('diario_bordo').insert({
    chamado_id:chamadoId, engenheiro_id:currentUser.id, tipo, data_trabalho:data, horas, descricao
  }).select().single();

  if (error) { toast('Erro: ' + error.message, 'error'); return; }

  if (novaEst) await sb.from('chamados').update({horas_estimadas:parseFloat(novaEst)}).eq('id',chamadoId);

  const files = document.getElementById('lan-files').files;
  for (const file of files) {
    const path = `${lancamento.id}/${Date.now()}_${file.name}`;
    const { error: upErr } = await sb.storage.from('anexos-diario').upload(path, file);
    if (!upErr) await sb.from('anexos_diario').insert({diario_id:lancamento.id, nome_arquivo:file.name, storage_path:path, tamanho_bytes:file.size, tipo_mime:file.type});
  }

  document.querySelectorAll('.modal-overlay').forEach(o => o.remove());
  toast('Lançamento salvo com sucesso!');
  navigateTo(currentPage);
}

async function downloadAnexo(path, bucket, nome) {
  const { data } = await sb.storage.from(bucket).createSignedUrl(path, 60);
  if (data?.signedUrl) { window.open(data.signedUrl, '_blank'); }
  else { toast('Erro ao baixar arquivo', 'error'); }
}

        </div>
        <table>
          <thead><tr><th>Nome</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${(empresas||[]).map(e => `
              <tr>
                <td>${e.nome}</td>
                <td><span class="badge ${e.ativo ? 'badge-concluido' : 'badge-rejeitado'}">${e.ativo ? 'Ativa' : 'Inativa'}</span></td>
                <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="toggleItem('empresas','${e.id}',${!e.ativo})">${e.ativo ? 'Desativar' : 'Ativar'}</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Setores</div>
          <button class="btn btn-primary btn-sm" onclick="addSetor()">+ Adicionar</button>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${(setores||[]).map(s => `
              <tr>
                <td>${s.nome}</td>
                <td><span class="badge ${s.ativo ? 'badge-concluido' : 'badge-rejeitado'}">${s.ativo ? 'Ativo' : 'Inativo'}</span></td>
                <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="toggleItem('setores','${s.id}',${!s.ativo})">${s.ativo ? 'Desativar' : 'Ativar'}</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

    </div>`;
}

async function addItem(tabela, label) {
  const nome = prompt(`Nome do novo ${label}:`);
  if (!nome?.trim()) return;
  const { error } = await sb.from(tabela).insert({nome: nome.trim()});
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast(`${label} adicionado`);
  renderConfiguracoes();
}

async function addSetor() {
  const { data: empresas } = await sb.from('empresas').select('id,nome').eq('ativo',true).order('nome');
  const nome = prompt('Nome do novo setor:');
  if (!nome?.trim()) return;
  const { data: setor, error } = await sb.from('setores').insert({nome: nome.trim()}).select().single();
  if (error) { toast('Erro: ' + error.message, 'error'); return; }

  const empNomes = empresas.map(e => e.nome).join(', ');
  const empIds = prompt(`Quais empresas terão este setor?\n\nEmpresas disponíveis:\n${empNomes}\n\nDigite os nomes separados por vírgula (ou deixe em branco para todas):`);
  let empresasFiltradas = empresas;
  if (empIds?.trim()) {
    const nomesFiltro = empIds.split(',').map(n => n.trim().toLowerCase());
    empresasFiltradas = empresas.filter(e => nomesFiltro.some(n => e.nome.toLowerCase().includes(n)));
  }

  for (const emp of empresasFiltradas) {
    await sb.from('empresa_setores').insert({empresa_id:emp.id, setor_id:setor.id}).catch(()=>{});
  }

  toast('Setor adicionado');
  renderConfiguracoes();
}

async function toggleItem(tabela, id, ativo) {
  await sb.from(tabela).update({ativo}).eq('id',id);
  toast(ativo ? 'Ativado' : 'Desativado');
  renderConfiguracoes();
}
</script>
</body>
</html>
